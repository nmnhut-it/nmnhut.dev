baseURL = "https://nmnhut.dev/"
relativeURLs = true
languageCode = "en-us"
title = "nmnhut"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Personal blog by Minh-Nhut Nguyen"
  author = "Minh-Nhut Nguyen"
  defaultTheme = "auto"  # light/dark/auto
  showReadingTime = true
  showShareButtons = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  showToc = true

  [params.homeInfoParams]
    Title = "A little burrow on the internet"
    Content = "Just a squirrel collecting shiny things — bits of code, AI tricks, and ideas worth keeping. Nothing fancy, just stuff I found interesting enough to stash here."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nmnhut-it"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "story"
    name = "Story"
    url = "/story/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true
