<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Farm - nmnhut.dev</title>
  <style>
    :root {
      --bg: #1b2838;
      --surface: #1e3a4f;
      --surface2: #162d3e;
      --accent: #f59e0b;
      --accent2: #10b981;
      --red: #ef4444;
      --green: #4ade80;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --pink: #f472b6;
      --text: #e8e0d4;
      --text2: #8ba4b5;
      --bubble-npc: #2a4a5e;
      --bubble-player: #3b5e3b;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Setup screen */
    #setup-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; padding: 20px;
      background: linear-gradient(135deg, #1b2838 0%, #0f2027 50%, #203a43 100%);
    }
    #setup-screen h1 { font-size: 2.2rem; margin-bottom: 4px; color: var(--accent); }
    #setup-screen .subtitle { color: var(--text2); margin-bottom: 28px; font-size: 0.9rem; }
    .setup-box {
      background: var(--surface); border-radius: var(--radius); padding: 24px;
      max-width: 440px; width: 100%; display: flex; flex-direction: column; gap: 14px;
      border: 1px solid #ffffff10;
    }
    .setup-box label { font-size: 0.82rem; color: var(--text2); }
    .setup-box input {
      width: 100%; padding: 10px 12px; background: var(--surface2);
      border: 1px solid #ffffff12; border-radius: 8px; color: var(--text);
      font-size: 0.9rem; outline: none;
    }
    .setup-box input:focus { border-color: var(--accent); }
    .setup-box .field { display: flex; flex-direction: column; gap: 5px; }
    .setup-box .hint { font-size: 0.72rem; color: var(--text2); }
    #btn-start {
      padding: 12px; background: var(--accent); color: #000; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 700;
      margin-top: 6px; transition: transform .1s, opacity .15s;
    }
    #btn-start:hover { opacity: .9; transform: scale(1.02); }
    #btn-start:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .setup-error { color: var(--red); font-size: 0.82rem; display: none; }

    /* Game screen */
    #game-screen { display: none; height: 100vh; flex-direction: column; }
    #game-screen.active { display: flex; }
    #setup-screen.hidden { display: none; }

    /* HUD bar */
    .hud {
      display: flex; align-items: center; gap: 4px; padding: 6px 12px;
      background: linear-gradient(180deg, #0f1c2e, #162d3e);
      border-bottom: 2px solid #0a1520; flex-shrink: 0; flex-wrap: wrap;
      justify-content: center;
    }
    .hud-stat {
      display: flex; align-items: center; gap: 3px; font-size: 0.78rem;
      padding: 3px 8px; background: #00000040; border-radius: 6px; white-space: nowrap;
    }

    /* Main layout */
    .main-layout { display: flex; flex: 1; min-height: 0; }

    /* Farm side */
    .farm-side {
      width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
      border-right: 2px solid #0a1520; overflow-y: auto;
      background: linear-gradient(180deg, #162d3e, #1b2838);
    }
    .panel-section { padding: 12px; border-bottom: 1px solid #0a152080; }
    .panel-section h3 {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text2); margin-bottom: 8px;
    }

    /* Farm grid */
    .farm-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; max-width: 280px; }
    .farm-cell {
      aspect-ratio: 1; background: #1a3040; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; position: relative; transition: background .2s;
      border: 1px solid #0a152060;
    }
    .farm-cell.tilled { background: #3d2b1f; }
    .farm-cell.planted { background: #2a4a2a; }
    .farm-cell.grown { background: #1f6a1f; box-shadow: 0 0 6px #4ade8040; }
    .farm-cell.watered::after {
      content: ''; position: absolute; top: 2px; right: 2px;
      width: 6px; height: 6px; background: var(--blue); border-radius: 50%;
    }
    .farm-cell .growth-bar {
      position: absolute; bottom: 1px; left: 1px; right: 1px; height: 2px;
      background: #ffffff15; border-radius: 1px; overflow: hidden;
    }
    .farm-cell .growth-bar .fill { height: 100%; background: var(--green); border-radius: 1px; }
    .farm-cell .growth-text {
      position: absolute; top: 1px; left: 0; right: 0; text-align: center;
      font-size: 0.55rem; color: #ffffffaa; font-weight: 600; pointer-events: none;
    }
    .farm-cell.ready { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px #4ade8040; }
      50% { box-shadow: 0 0 14px #4ade80aa, 0 0 20px #4ade8040; }
    }

    /* Quest log */
    .quest-log { display: flex; flex-direction: column; gap: 6px; max-height: 140px; overflow-y: auto; }
    .quest-item {
      padding: 6px 8px; background: #00000030; border-radius: 6px;
      font-size: 0.76rem; border-left: 3px solid var(--accent);
    }
    .quest-item.completed { border-left-color: var(--green); opacity: 0.6; }
    .quest-title { font-weight: 600; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
    .quest-desc { color: var(--text2); font-size: 0.7rem; margin-bottom: 4px; }
    .quest-objective { font-size: 0.68rem; color: var(--text2); }
    .quest-progress-bar {
      height: 3px; background: #ffffff15; border-radius: 2px; margin-top: 3px; overflow: hidden;
    }
    .quest-progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
    .quest-reward-text { font-size: 0.65rem; color: var(--yellow); margin-top: 2px; }
    .quest-badge {
      display: inline-block; background: var(--red); color: #fff; font-size: 0.6rem;
      padding: 0 5px; border-radius: 8px; margin-left: 4px; font-weight: 700;
    }

    /* NPC reaction bubble */
    .bubble.reaction .bubble-content {
      background: #2a4a5e90; border: 1px dashed #ffffff20;
    }

    /* Inventory */
    .inv-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .inv-item {
      display: flex; align-items: center; gap: 3px; padding: 3px 8px;
      background: #00000030; border-radius: 4px; font-size: 0.78rem;
    }
    .inv-item .qty { color: var(--yellow); font-weight: 600; }

    /* Animals */
    .animal-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .animal-tag { padding: 3px 8px; background: #00000030; border-radius: 4px; font-size: 0.78rem; }

    /* Event log */
    .event-log { display: flex; flex-direction: column; gap: 2px; max-height: 80px; overflow-y: auto; }
    .event-entry { font-size: 0.72rem; color: var(--text2); padding: 2px 0; }

    /* Game area (right side) */
    .game-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
      background: linear-gradient(180deg, #1b2838 0%, #162d3e 100%);
    }

    /* Speech bubble area */
    .bubble-area {
      flex: 1; overflow-y: auto; padding: 16px; display: flex;
      flex-direction: column; gap: 10px;
    }
    .bubble {
      display: flex; gap: 10px; align-items: flex-start;
      animation: fadeIn .3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .bubble-avatar {
      width: 40px; height: 40px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 1.4rem;
      flex-shrink: 0; border: 2px solid #ffffff15;
    }
    .bubble-content {
      max-width: 80%; padding: 10px 14px; border-radius: 12px;
      font-size: 0.88rem; line-height: 1.5; position: relative;
    }
    .bubble-name {
      font-size: 0.7rem; font-weight: 700; margin-bottom: 3px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .bubble-text { white-space: pre-wrap; word-wrap: break-word; }

    /* NPC bubble */
    .bubble.npc .bubble-avatar { background: var(--bubble-npc); }
    .bubble.npc .bubble-content { background: var(--bubble-npc); border-bottom-left-radius: 4px; }
    .bubble.npc .bubble-name { color: var(--accent); }

    /* Player bubble */
    .bubble.player { flex-direction: row-reverse; }
    .bubble.player .bubble-avatar { background: var(--bubble-player); }
    .bubble.player .bubble-content {
      background: var(--bubble-player); border-bottom-right-radius: 4px; text-align: right;
    }
    .bubble.player .bubble-name { color: var(--accent2); }

    /* System bubble */
    .bubble.system {
      justify-content: center;
    }
    .bubble.system .bubble-content {
      background: #00000040; font-size: 0.78rem; color: var(--text2);
      text-align: center; border-radius: 8px; max-width: 90%; padding: 6px 14px;
    }

    .typing-indicator {
      display: none; padding: 10px 14px; background: var(--bubble-npc);
      border-radius: 12px; font-size: 0.82rem; color: var(--text2);
      align-self: flex-start; margin-left: 50px;
    }
    .typing-indicator.visible { display: block; }
    .typing-indicator span { animation: blink 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,60%,100%{opacity:.2} 30%{opacity:1} }

    /* Action bar */
    .action-bar {
      padding: 10px 16px; border-top: 2px solid #0a1520;
      background: linear-gradient(180deg, #162d3e, #0f1c2e); flex-shrink: 0;
    }
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .suggestions:empty { display: none; margin-bottom: 0; }
    .suggest-btn {
      padding: 7px 14px; background: var(--surface); border: 1px solid #ffffff18;
      border-radius: 20px; color: var(--text); font-size: 0.82rem; cursor: pointer;
      transition: all .15s; font-family: inherit; white-space: nowrap;
    }
    .suggest-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.03); }
    .suggest-btn:disabled { opacity: .5; cursor: not-allowed; }

    .prompt-row { display: flex; gap: 8px; }
    #chat-input {
      flex: 1; padding: 9px 12px; background: #0a152080; border: 1px solid #ffffff12;
      border-radius: 20px; color: var(--text); font-size: 0.88rem; outline: none;
      font-family: inherit; resize: none; min-height: 38px; max-height: 80px;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text2); }
    #btn-send {
      padding: 9px 16px; background: var(--accent); color: #000; border: none;
      border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
      transition: transform .1s, opacity .15s; align-self: flex-end;
    }
    #btn-send:hover { opacity: .9; transform: scale(1.05); }
    #btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Farm toggle */
    .farm-toggle { display: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ffffff18; border-radius: 3px; }

    /* Responsive — tablet */
    @media (max-width: 800px) {
      .main-layout { flex-direction: column; }
      .farm-side {
        width: 100%; max-height: none; border-right: none;
        border-bottom: 2px solid #0a1520; overflow-y: visible; flex-shrink: 0;
      }
      .farm-grid { max-width: 260px; }
      .farm-side .panel-section { display: none; }
      .farm-side .panel-section:first-child { display: block; padding: 8px 12px; }
      .farm-side .panel-section.show-mobile { display: block; }
      .farm-toggle {
        display: flex !important; align-items: center; justify-content: center;
        padding: 6px; background: #0a152060; border: none; color: var(--text2);
        font-size: 0.72rem; cursor: pointer; width: 100%; font-family: inherit;
      }
      .farm-toggle:hover { color: var(--text); }
      .game-area { min-height: 0; flex: 1; }
    }

    /* Responsive — phone */
    @media (max-width: 500px) {
      .hud { gap: 3px; padding: 5px 8px; }
      .hud-stat { font-size: 0.7rem; padding: 2px 6px; }
      .farm-grid { max-width: 220px; gap: 2px; }
      .farm-cell { font-size: 1rem; }
      .bubble-area { padding: 10px; gap: 8px; }
      .bubble-avatar { width: 32px; height: 32px; font-size: 1.1rem; }
      .bubble-content { padding: 8px 10px; font-size: 0.82rem; max-width: 85%; }
      .action-bar { padding: 8px 10px; }
      .suggestions { gap: 4px; margin-bottom: 6px; }
      .suggest-btn { padding: 5px 10px; font-size: 0.75rem; }
      #chat-input { padding: 7px 10px; font-size: 0.82rem; }
      #btn-send { padding: 7px 12px; font-size: 0.8rem; }
      #setup-screen h1 { font-size: 1.6rem; }
      .setup-box { padding: 18px; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <h1>LLM Farm</h1>
  <p class="subtitle">A narrative farm sim powered by AI</p>
  <div class="setup-box">
    <div class="field">
      <label>API Endpoint</label>
      <input type="text" id="api-url" value="https://api.openai.com/v1/chat/completions" placeholder="https://api.openai.com/v1/chat/completions">
      <span class="hint">Any OpenAI-compatible endpoint (OpenAI, Ollama, LM Studio, etc.)</span>
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="sk-...">
      <span class="hint">Stored only in your browser session</span>
    </div>
    <div class="field">
      <label>Model</label>
      <input type="text" id="model-name" value="gpt-4o-mini" placeholder="gpt-4o-mini">
    </div>
    <div class="field">
      <label>Your farmer name</label>
      <input type="text" id="farmer-name" value="" placeholder="What should we call you?">
    </div>
    <p class="setup-error" id="setup-error"></p>
    <button id="btn-start">Start Farming</button>
  </div>
</div>

<!-- Game Screen -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-stat">📅 <span id="stat-day">Day 1</span> · <span id="stat-season">Spring</span></div>
    <div class="hud-stat">🌤 <span id="stat-weather">Sunny</span></div>
    <div class="hud-stat">💰 <span id="stat-gold">50</span></div>
    <div class="hud-stat">⚡ <span id="stat-energy">10/10</span></div>
    <div class="hud-stat">⭐ <span id="stat-reputation">0</span></div>
  </div>

  <div class="main-layout">
    <div class="farm-side">
      <div class="panel-section">
        <h3>Farm</h3>
        <div class="farm-grid" id="farm-grid"></div>
      </div>
      <div class="panel-section">
        <h3>Inventory</h3>
        <div class="inv-list" id="inventory-list">
          <span class="inv-item" style="color:var(--text2)">Empty</span>
        </div>
      </div>
      <div class="panel-section">
        <h3>Animals</h3>
        <div class="animal-list" id="animal-list">
          <span class="animal-tag" style="color:var(--text2)">None yet</span>
        </div>
      </div>
      <div class="panel-section">
        <h3>Quests <span class="quest-badge" id="quest-badge" style="display:none">0</span></h3>
        <div class="quest-log" id="quest-log">
          <span class="quest-item" style="color:var(--text2);border-left-color:var(--text2)">No quests yet</span>
        </div>
      </div>
      <div class="panel-section">
        <h3>Events</h3>
        <div class="event-log" id="event-log"></div>
      </div>
      <button class="farm-toggle" id="farm-toggle">Show inventory &amp; details ▾</button>
    </div>

    <div class="game-area">
      <div class="bubble-area" id="chat-messages">
        <div class="typing-indicator" id="typing">
          <span>.</span><span>.</span><span>.</span>
        </div>
      </div>
      <div class="action-bar">
        <div class="suggestions" id="suggestions"></div>
        <div class="prompt-row">
          <textarea id="chat-input" placeholder="What do you want to do?" rows="1"></textarea>
          <button id="btn-send">Go</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// GAME STATE
// ============================================================
const GRID_SIZE = 5;
const SEASONS = ['Spring', 'Summer', 'Autumn', 'Winter'];
const WEATHER_OPTIONS = ['Sunny', 'Cloudy', 'Rainy', 'Stormy', 'Windy', 'Foggy', 'Heatwave', 'Snowy'];
const CROP_ICONS = {
  empty: '', tilled: '🟫', wheat: '🌾', corn: '🌽', carrot: '🥕', potato: '🥔',
  tomato: '🍅', pumpkin: '🎃', strawberry: '🍓', sunflower: '🌻', melon: '🍈',
  cabbage: '🥬', rice: '🌾', flower: '🌸', herb: '🌿', berry: '🫐',
};
const ANIMAL_ICONS = {
  chicken: '🐔', cow: '🐄', sheep: '🐑', pig: '🐷', horse: '🐴',
  cat: '🐱', dog: '🐶', duck: '🦆', goat: '🐐', rabbit: '🐇',
};
const NPC_AVATARS = {
  narrator: '📖', shopkeeper: '🏪', traveler: '🧙', rival: '😤',
  neighbor: '👵', mayor: '🎩', blacksmith: '⚒️', fisherman: '🎣',
  witch: '🧹', child: '👦', merchant: '🐫', guard: '🛡️',
};

// ============================================================
// EVENT SYSTEM (Pub/Sub)
// ============================================================
class GameEvents {
  constructor() { this._listeners = {}; }
  on(event, cb) {
    if (!this._listeners[event]) this._listeners[event] = [];
    this._listeners[event].push(cb);
  }
  off(event, cb) {
    if (!this._listeners[event]) return;
    this._listeners[event] = this._listeners[event].filter(fn => fn !== cb);
  }
  emit(event, data) {
    if (!this._listeners[event]) return;
    for (const cb of this._listeners[event]) cb(data);
  }
}
const gameEvents = new GameEvents();

// ============================================================
// NPC REACTIONS (pre-scripted, no LLM call needed)
// ============================================================
const NPC_REACTIONS = {
  plantGrown: [
    { speaker: 'neighbor', text: "Your crops are ready to harvest, dear!" },
    { speaker: 'narrator', text: "A crop ripens, ready for the picking." },
    { speaker: 'shopkeeper', text: "I see a harvest coming! Bring it to my shop!" },
  ],
  seasonChange: [
    { speaker: 'narrator', text: "The season shifts. The air feels different." },
    { speaker: 'neighbor', text: "New season, new possibilities!" },
    { speaker: 'mayor', text: "A new season dawns upon our village!" },
  ],
  lowEnergy: [
    { speaker: 'neighbor', text: "You look exhausted, dear. Get some rest!" },
    { speaker: 'narrator', text: "Exhaustion weighs heavy. Time to sleep." },
  ],
  questComplete: [
    { speaker: 'narrator', text: "Quest complete! Well done, farmer." },
  ],
  dayChange: [
    { speaker: 'narrator', text: "A new day begins on the farm." },
  ],
};

// ============================================================
// QUEST DEFINITIONS
// ============================================================
const AVAILABLE_QUESTS = [
  {
    id: 'first_harvest', title: 'First Harvest',
    description: 'Grow and harvest your first crop.',
    giver: 'neighbor',
    objectives: [{ type: 'harvest', target: 'any', current: 0, required: 1 }],
    rewards: { gold: 25, reputation: 5 },
    prereqs: [],
    giverDialogue: "Why don't you try growing something, dear? I'll reward you!",
    completeDialogue: "Wonderful harvest! Here's a little something.",
  },
  {
    id: 'meet_shopkeeper', title: 'Meet the Merchant',
    description: 'Visit the shop and talk to the shopkeeper.',
    giver: 'mayor',
    objectives: [{ type: 'talk', target: 'shopkeeper', current: 0, required: 1 }],
    rewards: { gold: 10, reputation: 3 },
    prereqs: [],
    giverDialogue: "You should meet our shopkeeper. Fine fellow, that one!",
    completeDialogue: "Good, good! Getting to know the townsfolk!",
  },
  {
    id: 'animal_friend', title: 'Animal Friend',
    description: 'Buy your first animal.',
    giver: 'neighbor',
    objectives: [{ type: 'animal', target: 'any', current: 0, required: 1 }],
    rewards: { gold: 30, reputation: 5 },
    prereqs: [],
    giverDialogue: "A farm needs animals! Try getting one from the shop.",
    completeDialogue: "What a cute little critter! Take good care of it.",
  },
  {
    id: 'green_thumb', title: 'Green Thumb',
    description: 'Grow 3 different types of crops.',
    giver: 'traveler',
    objectives: [{ type: 'grow_types', target: 3, current: 0, required: 3 }],
    rewards: { gold: 50, reputation: 10 },
    prereqs: ['first_harvest'],
    giverDialogue: "A true farmer grows variety. Show me three different crops!",
    completeDialogue: "Impressive diversity! The land favors you.",
  },
  {
    id: 'social_butterfly', title: 'Social Butterfly',
    description: 'Meet 3 different NPCs.',
    giver: 'mayor',
    objectives: [{ type: 'meet_npcs', target: 3, current: 0, required: 3 }],
    rewards: { gold: 20, reputation: 15 },
    prereqs: [],
    giverDialogue: "A village thrives on connections. Meet 3 townsfolk!",
    completeDialogue: "You're becoming a true member of our community!",
  },
  {
    id: 'big_sale', title: 'Big Sale',
    description: 'Earn 100 gold total from your farm.',
    giver: 'shopkeeper',
    objectives: [{ type: 'earn_gold', target: 100, current: 0, required: 100 }],
    rewards: { gold: 40, reputation: 10 },
    prereqs: ['first_harvest'],
    giverDialogue: "Think you can earn 100 gold? I'll add a bonus if you do!",
    completeDialogue: "A hundred gold! You're a natural merchant!",
  },
];

// ============================================================
// GROWTH TIMER CONSTANTS
// ============================================================
const GROWTH_TICK_INTERVAL = 5000; // 5 seconds
const GROWTH_PER_TICK = 5; // 5% per tick
let growthTimerId = null;

let gameState = {};
let conversationHistory = [];
let apiConfig = {};

function createInitialState(farmerName) {
  const grid = [];
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    grid.push({ crop: 'empty', growth: 0, watered: false });
  }
  return {
    farmerName: farmerName || 'Farmer',
    day: 1,
    season: 'Spring',
    weather: 'Sunny',
    gold: 50,
    energy: 10,
    maxEnergy: 10,
    reputation: 0,
    grid: grid,
    inventory: {},
    animals: [],
    events: [],
    relationships: {},
    skills: { farming: 1, foraging: 1, fishing: 1, cooking: 1 },
    flags: {},
    quests: { active: [], completed: [] },
    grownCropTypes: [], // tracks unique crop types grown (for green_thumb quest)
    totalGoldEarned: 0, // tracks gold earned from selling (for big_sale quest)
  };
}

// ============================================================
// SYSTEM PROMPT
// ============================================================
function buildSystemPrompt() {
  return `You are the game engine for "LLM Farm", a farm RPG. You control narration AND NPCs.

## RESPONSE FORMAT
Valid JSON only (no markdown, no fences):
{
  "messages": [
    { "speaker": "narrator", "text": "Short scene description." },
    { "speaker": "shopkeeper", "text": "NPC dialogue line here." }
  ],
  "suggestedActions": ["Do this", "Or this", "Try this"],
  "stateChanges": {
    "day": null, "season": null, "weather": null, "gold": null,
    "energy": null, "maxEnergy": null, "reputation": null, "grid": null,
    "inventory": null, "animals": null, "events": null,
    "relationships": null, "skills": null, "flags": null,
    "questProgress": null
  }
}

## MESSAGES RULES
- Return 1-3 messages per response. Each is a speech bubble.
- The "speaker" is a character ID: "narrator", "shopkeeper", "traveler", "rival", "neighbor", "mayor", "blacksmith", "fisherman", "witch", "child", "merchant", "guard", or any new NPC name.
- The "narrator" describes scenes and actions. Narrator messages: MAX 20 WORDS. Be punchy and vivid.
- NPC dialogue: MAX 25 WORDS per line. Give NPCs distinct voices and personalities.
- NPCs should appear frequently! The shopkeeper greets you in shops, neighbors wave, travelers appear randomly. The world should feel populated.
- When the player talks to or encounters someone, that NPC speaks directly.
- NEVER have the narrator deliver dialogue. NPCs always speak for themselves.

## NPC PERSONALITIES (use these consistently)
- shopkeeper: Friendly, merchant-speak. "Best seeds in town! 10 gold, friend."
- neighbor: Warm elderly woman named Martha. Gives advice and cookies.
- rival: Competitive farmer named Rex. Snarky but secretly respectful.
- traveler: Mysterious wanderer. Cryptic hints about buried treasure and secrets.
- mayor: Pompous but well-meaning. Announces festivals and contests.
- blacksmith: Gruff, few words. Sells tools.
- fisherman: Old, relaxed, philosophical. Hangs by the river.

## SUGGESTED ACTIONS RULES
- ALWAYS include 3-5 actions. Short imperative phrases, 3-6 words each.
- Mix: one farming, one social, one wild/fun option.
- Context-aware: reflect weather, energy, time, what just happened.
- Low energy? Suggest rest. NPC nearby? Suggest talking to them.

## STATE CHANGE RULES
- Only include changed fields. Use null for unchanged.
- day: +1 for big actions (farming, exploring, sleeping). Quick chats don't advance.
- season: Changes every 7 days. Spring→Summer→Autumn→Winter→Spring.
- weather: New each day. Sunny/Cloudy/Rainy/Stormy/Windy/Foggy/Heatwave(summer)/Snowy(winter).
- gold: Seeds 5-15g, crops sell 10-40g, animals 50-200g.
- energy: -1 to -3 per physical action. Resets on sleep.
- grid: 25 cells [{crop, growth, watered}]. Growth 0-100. Plants grow automatically in real-time when watered. Rain waters all.
- inventory: {item: qty}. qty<=0 removes it.
- animals: [{type, name, happiness, daysOwned}].
- events: Last 5 strings.
- relationships: {npc: {friendship: 0-100, met: bool}}. IMPORTANT: Set met=true when the player talks to or encounters an NPC.
- skills: {skill: 1-10}. Level up with use.
- flags: Story progress tracking.
- questProgress: {quest_id: {objective_index: increment}}. Advance quest objectives when the player does something relevant (e.g. harvesting, selling, meeting NPCs).

## ACTIVE QUESTS
${JSON.stringify(gameState.quests?.active || [], null, 2)}

## COMPLETED QUESTS
${(gameState.quests?.completed || []).map(q => q.title).join(', ') || 'None yet'}

## CURRENT GAME STATE
\`\`\`json
${JSON.stringify(gameState, null, 2)}
\`\`\`

## IMPORTANT
- ALWAYS valid JSON. No markdown.
- Keep it snappy — this is a game, not a novel.
- Introduce NPCs early and often. The player should meet someone within the first 2 actions.
- Say yes to creative actions. Add consequences.
- If energy is 0, narrate exhaustion.`;
}

// ============================================================
// LLM INTERACTION
// ============================================================
async function sendToLLM(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  const messages = [
    { role: 'system', content: buildSystemPrompt() },
    ...conversationHistory.slice(-20),
  ];

  const res = await fetch(apiConfig.url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(apiConfig.key ? { 'Authorization': `Bearer ${apiConfig.key}` } : {}),
    },
    body: JSON.stringify({ model: apiConfig.model, messages, temperature: 0.85, max_tokens: 1000 }),
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`API error ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const content = data.choices?.[0]?.message?.content;
  if (!content) throw new Error('Empty response from API');

  conversationHistory.push({ role: 'assistant', content });

  let parsed;
  try { parsed = JSON.parse(content); } catch {
    const match = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (match) { parsed = JSON.parse(match[1].trim()); }
    else {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) { parsed = JSON.parse(jsonMatch[0]); }
      else { throw new Error('Could not parse JSON from response'); }
    }
  }

  // Support old format (narrative string) for backwards compat
  if (parsed.narrative && !parsed.messages) {
    parsed.messages = [{ speaker: 'narrator', text: parsed.narrative }];
  }

  return parsed;
}

// ============================================================
// STATE MANAGEMENT
// ============================================================
function applyStateChanges(changes) {
  if (!changes) return;
  const oldDay = gameState.day;
  const oldSeason = gameState.season;
  const oldEnergy = gameState.energy;
  const oldGold = gameState.gold;
  const oldAnimals = gameState.animals ? gameState.animals.length : 0;
  const oldRelationships = { ...gameState.relationships };

  for (const [key, value] of Object.entries(changes)) {
    if (value === null || value === undefined) continue;
    if (key === 'inventory' && typeof value === 'object') {
      for (const [item, qty] of Object.entries(value)) {
        if (qty <= 0) { delete gameState.inventory[item]; }
        else { gameState.inventory[item] = qty; }
      }
    } else if (key === 'relationships' && typeof value === 'object') {
      gameState.relationships = { ...gameState.relationships, ...value };
    } else if (key === 'skills' && typeof value === 'object') {
      gameState.skills = { ...gameState.skills, ...value };
    } else if (key === 'flags' && typeof value === 'object') {
      gameState.flags = { ...gameState.flags, ...value };
    } else if (key === 'events' && Array.isArray(value)) {
      gameState.events = value.slice(-5);
    } else if (key === 'questProgress' && typeof value === 'object') {
      // LLM can advance quest objectives
      for (const [questId, progress] of Object.entries(value)) {
        const quest = gameState.quests.active.find(q => q.id === questId);
        if (quest) {
          for (const [objIdx, increment] of Object.entries(progress)) {
            const idx = parseInt(objIdx);
            if (quest.objectives[idx]) {
              quest.objectives[idx].current = Math.min(
                quest.objectives[idx].current + increment,
                quest.objectives[idx].required
              );
            }
          }
        }
      }
    } else {
      gameState[key] = value;
    }
  }

  // Emit events based on state changes
  if (gameState.day !== oldDay) gameEvents.emit('dayChange', { day: gameState.day });
  if (gameState.season !== oldSeason) gameEvents.emit('seasonChange', { season: gameState.season });
  if (gameState.energy <= 1 && oldEnergy > 1) gameEvents.emit('lowEnergy', { energy: gameState.energy });

  // Track gold earned (if gold increased, it was a sale)
  if (gameState.gold > oldGold) {
    gameState.totalGoldEarned = (gameState.totalGoldEarned || 0) + (gameState.gold - oldGold);
  }

  // Track new animals for quest
  if (gameState.animals && gameState.animals.length > oldAnimals) {
    gameEvents.emit('animalBought', { count: gameState.animals.length });
  }

  // Track NPC meetings for quest
  if (gameState.relationships) {
    for (const [npc, rel] of Object.entries(gameState.relationships)) {
      if (rel.met && (!oldRelationships[npc] || !oldRelationships[npc].met)) {
        gameEvents.emit('npcMet', { npc });
      }
    }
  }

  // Check quest progress after state changes
  checkQuestProgress();
}

// ============================================================
// UI RENDERING
// ============================================================
function renderStats() {
  document.getElementById('stat-day').textContent = `Day ${gameState.day}`;
  document.getElementById('stat-season').textContent = gameState.season;
  document.getElementById('stat-weather').textContent = gameState.weather;
  document.getElementById('stat-gold').textContent = gameState.gold;
  document.getElementById('stat-energy').textContent = `${gameState.energy}/${gameState.maxEnergy}`;
  document.getElementById('stat-reputation').textContent = gameState.reputation;
}

function renderGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';
  for (const cell of gameState.grid) {
    const div = document.createElement('div');
    div.className = 'farm-cell';
    if (cell.crop === 'tilled') div.classList.add('tilled');
    else if (cell.crop !== 'empty' && cell.growth >= 100) { div.classList.add('grown'); div.classList.add('ready'); }
    else if (cell.crop !== 'empty') div.classList.add('planted');
    if (cell.watered) div.classList.add('watered');
    const icon = CROP_ICONS[cell.crop] || (cell.crop !== 'empty' ? '🌱' : '');
    div.textContent = icon;
    if (cell.crop !== 'empty' && cell.crop !== 'tilled') {
      // Growth percentage overlay
      const pctText = document.createElement('div');
      pctText.className = 'growth-text';
      pctText.textContent = cell.growth >= 100 ? '✓' : `${Math.round(cell.growth)}%`;
      div.appendChild(pctText);
      // Growth bar
      const bar = document.createElement('div');
      bar.className = 'growth-bar';
      bar.innerHTML = `<div class="fill" style="width:${Math.min(cell.growth, 100)}%"></div>`;
      div.appendChild(bar);
    }
    grid.appendChild(div);
  }
}

function renderInventory() {
  const list = document.getElementById('inventory-list');
  const items = Object.entries(gameState.inventory);
  if (items.length === 0) {
    list.innerHTML = '<span class="inv-item" style="color:var(--text2)">Empty</span>';
    return;
  }
  list.innerHTML = items.map(([name, qty]) =>
    `<span class="inv-item">${CROP_ICONS[name] || '📦'} ${name} <span class="qty">x${qty}</span></span>`
  ).join('');
}

function renderAnimals() {
  const list = document.getElementById('animal-list');
  if (gameState.animals.length === 0) {
    list.innerHTML = '<span class="animal-tag" style="color:var(--text2)">None yet</span>';
    return;
  }
  list.innerHTML = gameState.animals.map(a =>
    `<span class="animal-tag">${ANIMAL_ICONS[a.type] || '🐾'} ${a.name}</span>`
  ).join('');
}

function renderEvents() {
  const log = document.getElementById('event-log');
  if (gameState.events.length === 0) {
    log.innerHTML = '<span class="event-entry" style="color:var(--text2)">No events yet</span>';
    return;
  }
  log.innerHTML = gameState.events.map(e =>
    `<div class="event-entry">${e}</div>`
  ).join('');
}

function renderQuests() {
  const log = document.getElementById('quest-log');
  const badge = document.getElementById('quest-badge');
  if (!gameState.quests) return;

  const active = gameState.quests.active || [];
  const completed = gameState.quests.completed || [];

  if (active.length === 0 && completed.length === 0) {
    log.innerHTML = '<span class="quest-item" style="color:var(--text2);border-left-color:var(--text2)">No quests yet</span>';
    badge.style.display = 'none';
    return;
  }

  let html = '';
  for (const quest of active) {
    const totalRequired = quest.objectives.reduce((s, o) => s + o.required, 0);
    const totalCurrent = quest.objectives.reduce((s, o) => s + Math.min(o.current, o.required), 0);
    const pct = Math.round((totalCurrent / totalRequired) * 100);
    const objText = quest.objectives.map(o =>
      `${o.current}/${o.required}`
    ).join(', ');
    html += `<div class="quest-item">
      <div class="quest-title">📋 ${escapeHtml(quest.title)}</div>
      <div class="quest-desc">${escapeHtml(quest.description)}</div>
      <div class="quest-objective">Progress: ${objText}</div>
      <div class="quest-progress-bar"><div class="fill" style="width:${pct}%"></div></div>
      <div class="quest-reward-text">Reward: ${quest.rewards.gold ? quest.rewards.gold + 'g' : ''}${quest.rewards.reputation ? ' +' + quest.rewards.reputation + ' rep' : ''}</div>
    </div>`;
  }
  for (const quest of completed.slice(-3)) {
    html += `<div class="quest-item completed">
      <div class="quest-title">✅ ${escapeHtml(quest.title)}</div>
    </div>`;
  }
  log.innerHTML = html;
  badge.style.display = active.length > 0 ? 'inline-block' : 'none';
  badge.textContent = active.length;
}

function renderAll() {
  renderStats(); renderGrid(); renderInventory(); renderAnimals(); renderQuests(); renderEvents();
}

function addBubble(speaker, text) {
  const container = document.getElementById('chat-messages');
  const typing = document.getElementById('typing');
  const bubble = document.createElement('div');
  const isPlayer = speaker === 'player';
  const isSystem = speaker === 'system';

  if (isSystem) {
    bubble.className = 'bubble system';
    bubble.innerHTML = `<div class="bubble-content"><div class="bubble-text">${escapeHtml(text)}</div></div>`;
  } else {
    const avatar = isPlayer ? '🧑‍🌾' : (NPC_AVATARS[speaker] || '💬');
    const name = isPlayer ? gameState.farmerName : speaker.charAt(0).toUpperCase() + speaker.slice(1);
    const cls = isPlayer ? 'player' : 'npc';
    bubble.className = `bubble ${cls}`;
    bubble.innerHTML = `
      <div class="bubble-avatar">${avatar}</div>
      <div class="bubble-content">
        <div class="bubble-name">${escapeHtml(name)}</div>
        <div class="bubble-text">${escapeHtml(text)}</div>
      </div>`;
  }
  container.insertBefore(bubble, typing);
  container.scrollTop = container.scrollHeight;
}

// Legacy support
function addMessage(text, type = 'narrator') {
  if (type === 'system') addBubble('system', text);
  else if (type === 'player') addBubble('player', text);
  else addBubble('narrator', text);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderSuggestions(actions) {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  if (!actions || !actions.length) return;
  for (const action of actions) {
    const btn = document.createElement('button');
    btn.className = 'suggest-btn';
    btn.textContent = action;
    btn.addEventListener('click', () => {
      if (sending) return;
      clearSuggestions();
      handlePlayerMessage(action);
    });
    container.appendChild(btn);
  }
}

function clearSuggestions() {
  document.getElementById('suggestions').innerHTML = '';
}

function setTyping(visible) {
  document.getElementById('typing').classList.toggle('visible', visible);
  const container = document.getElementById('chat-messages');
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// SEQUENTIAL MESSAGE DISPLAY
// ============================================================
function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function displayMessagesSequentially(messages) {
  if (!messages || !messages.length) return;
  displayingMessages = true;
  for (let i = 0; i < messages.length; i++) {
    const msg = messages[i];
    if (i > 0) {
      // Show typing indicator between messages
      setTyping(true);
      const waitTime = msg.speaker === 'narrator' ? 800 : 1200 + Math.random() * 600;
      await delay(waitTime);
      setTyping(false);
    }
    addBubble(msg.speaker || 'narrator', msg.text);
  }
  displayingMessages = false;
}

// ============================================================
// REAL-TIME PLANT GROWTH TIMER
// ============================================================
function startGrowthTimer() {
  if (growthTimerId) clearInterval(growthTimerId);
  growthTimerId = setInterval(() => {
    if (!gameState.grid) return;
    let anyGrew = false;
    for (let i = 0; i < gameState.grid.length; i++) {
      const cell = gameState.grid[i];
      if (cell.crop !== 'empty' && cell.crop !== 'tilled' && cell.watered && cell.growth < 100) {
        cell.growth = Math.min(cell.growth + GROWTH_PER_TICK, 100);
        anyGrew = true;
        if (cell.growth >= 100) {
          // Track crop type for green_thumb quest
          if (!gameState.grownCropTypes) gameState.grownCropTypes = [];
          if (!gameState.grownCropTypes.includes(cell.crop)) {
            gameState.grownCropTypes.push(cell.crop);
          }
          gameState.events = (gameState.events || []).concat(`${CROP_ICONS[cell.crop] || '🌱'} ${cell.crop} is ready to harvest!`).slice(-5);
          gameEvents.emit('plantGrown', { cellIndex: i, crop: cell.crop });
        }
      }
    }
    if (anyGrew) {
      renderGrid();
      renderEvents();
    }
  }, GROWTH_TICK_INTERVAL);
}

function stopGrowthTimer() {
  if (growthTimerId) { clearInterval(growthTimerId); growthTimerId = null; }
}

// ============================================================
// QUEST SYSTEM
// ============================================================
function getAvailableQuests() {
  // Quests that haven't been started or completed, and whose prereqs are met
  const completedIds = (gameState.quests?.completed || []).map(q => q.id);
  const activeIds = (gameState.quests?.active || []).map(q => q.id);
  return AVAILABLE_QUESTS.filter(q =>
    !completedIds.includes(q.id) &&
    !activeIds.includes(q.id) &&
    q.prereqs.every(p => completedIds.includes(p))
  );
}

function offerQuest(questId) {
  const template = AVAILABLE_QUESTS.find(q => q.id === questId);
  if (!template) return;
  // Deep clone the quest so objectives are independent
  const quest = JSON.parse(JSON.stringify(template));
  gameState.quests.active.push(quest);
  // NPC gives the quest via speech
  addBubble(quest.giver, quest.giverDialogue);
  addBubble('system', `New quest: ${quest.title}`);
  renderQuests();
}

function completeQuest(questId) {
  const idx = gameState.quests.active.findIndex(q => q.id === questId);
  if (idx === -1) return;
  const quest = gameState.quests.active.splice(idx, 1)[0];
  gameState.quests.completed.push({ id: quest.id, title: quest.title });

  // Apply rewards
  if (quest.rewards.gold) gameState.gold += quest.rewards.gold;
  if (quest.rewards.reputation) gameState.reputation += quest.rewards.reputation;

  // NPC completion dialogue
  const template = AVAILABLE_QUESTS.find(q => q.id === quest.id);
  if (template) {
    addBubble(template.giver, template.completeDialogue);
  }
  addBubble('system', `Quest complete: ${quest.title}! +${quest.rewards.gold || 0}g, +${quest.rewards.reputation || 0} rep`);

  gameEvents.emit('questComplete', { quest });
  renderAll();

  // Check if new quests are now available
  setTimeout(() => {
    const available = getAvailableQuests();
    if (available.length > 0) {
      offerQuest(available[0].id);
    }
  }, 2000);
}

function checkQuestProgress() {
  if (!gameState.quests) return;
  for (const quest of gameState.quests.active) {
    let allComplete = true;
    for (const obj of quest.objectives) {
      // Auto-update certain objective types based on game state
      if (obj.type === 'animal' && obj.target === 'any') {
        obj.current = Math.min(gameState.animals ? gameState.animals.length : 0, obj.required);
      } else if (obj.type === 'meet_npcs') {
        const metCount = Object.values(gameState.relationships || {}).filter(r => r.met).length;
        obj.current = Math.min(metCount, obj.required);
      } else if (obj.type === 'earn_gold') {
        obj.current = Math.min(gameState.totalGoldEarned || 0, obj.required);
      } else if (obj.type === 'grow_types') {
        obj.current = Math.min((gameState.grownCropTypes || []).length, obj.required);
      } else if (obj.type === 'talk' && obj.target) {
        const rel = gameState.relationships?.[obj.target];
        if (rel && rel.met) obj.current = Math.min(1, obj.required);
      } else if (obj.type === 'harvest' && obj.target === 'any') {
        // Track via grid: if any cell had a grown crop and is now empty, count as harvest
        // This is tracked by the LLM via questProgress stateChanges
      }

      if (obj.current < obj.required) allComplete = false;
    }
    if (allComplete) {
      completeQuest(quest.id);
      return; // complete one at a time
    }
  }
  renderQuests();
}

// ============================================================
// EVENT LISTENERS (NPC Reactions)
// ============================================================
function setupEventListeners() {
  gameEvents.on('plantGrown', (data) => {
    const reactions = NPC_REACTIONS.plantGrown;
    const reaction = reactions[Math.floor(Math.random() * reactions.length)];
    if (!displayingMessages && !sending) {
      addBubble(reaction.speaker, reaction.text);
    }
  });

  gameEvents.on('seasonChange', (data) => {
    const reactions = NPC_REACTIONS.seasonChange;
    const reaction = reactions[Math.floor(Math.random() * reactions.length)];
    addBubble(reaction.speaker, reaction.text);
  });

  gameEvents.on('lowEnergy', (data) => {
    const reactions = NPC_REACTIONS.lowEnergy;
    const reaction = reactions[Math.floor(Math.random() * reactions.length)];
    addBubble(reaction.speaker, reaction.text);
  });

  gameEvents.on('questComplete', (data) => {
    // Check for newly available quests
  });
}

// ============================================================
// GAME FLOW
// ============================================================
async function handlePlayerMessage(text) {
  if (sending) return;
  sending = true;

  const sendBtn = document.getElementById('btn-send');
  const input = document.getElementById('chat-input');
  sendBtn.disabled = true;
  input.disabled = true;

  addBubble('player', text);
  clearSuggestions();
  setTyping(true);

  try {
    const response = await sendToLLM(text);
    setTyping(false);

    // Display messages sequentially (one at a time with delays)
    if (response.messages && Array.isArray(response.messages)) {
      await displayMessagesSequentially(response.messages);
    } else if (response.narrative) {
      addBubble('narrator', response.narrative);
    }
    if (response.stateChanges) {
      applyStateChanges(response.stateChanges);
      renderAll();
    }
    renderSuggestions(response.suggestedActions);
  } catch (err) {
    setTyping(false);
    addBubble('system', `Something went wrong: ${err.message}`);
    console.error(err);
  } finally {
    sending = false;
    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

async function startGame() {
  const url = document.getElementById('api-url').value.trim();
  const key = document.getElementById('api-key').value.trim();
  const model = document.getElementById('model-name').value.trim();
  const name = document.getElementById('farmer-name').value.trim() || 'Farmer';
  const errorEl = document.getElementById('setup-error');

  if (!url) { errorEl.textContent = 'Please enter an API endpoint.'; errorEl.style.display = 'block'; return; }
  if (!model) { errorEl.textContent = 'Please enter a model name.'; errorEl.style.display = 'block'; return; }

  apiConfig = { url, key, model };
  localStorage.setItem('llmfarm_api_url', url);
  localStorage.setItem('llmfarm_api_key', key);
  localStorage.setItem('llmfarm_model', model);
  localStorage.setItem('llmfarm_farmer', name);
  gameState = createInitialState(name);

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  renderAll();

  // Start game systems
  setupEventListeners();
  startGrowthTimer();

  setTyping(true);
  try {
    const response = await sendToLLM(
      `[GAME START] The player "${name}" arrives at their new farm. Day 1, Spring. The farm is overgrown but full of potential. Give a SHORT welcome (narrator max 20 words), then have an NPC greet them (neighbor Martha or the shopkeeper). Suggest first actions.`
    );
    setTyping(false);
    if (response.messages && Array.isArray(response.messages)) {
      await displayMessagesSequentially(response.messages);
    } else if (response.narrative) {
      addBubble('narrator', response.narrative);
    }
    if (response.stateChanges) { applyStateChanges(response.stateChanges); renderAll(); }
    renderSuggestions(response.suggestedActions);

    // Offer first quests after a short delay
    setTimeout(() => {
      const available = getAvailableQuests();
      // Offer the first 2 quests that have no prereqs
      const starters = available.filter(q => q.prereqs.length === 0).slice(0, 2);
      starters.forEach((q, i) => {
        setTimeout(() => offerQuest(q.id), i * 2500);
      });
    }, 3000);
  } catch (err) {
    setTyping(false);
    addBubble('system', `Failed to connect: ${err.message}. Check your API settings and reload.`);
    console.error(err);
  }
}

// Restore saved settings from localStorage
(function() {
  const s = (k, id) => { const v = localStorage.getItem(k); if (v) document.getElementById(id).value = v; };
  s('llmfarm_api_url', 'api-url');
  s('llmfarm_api_key', 'api-key');
  s('llmfarm_model', 'model-name');
  s('llmfarm_farmer', 'farmer-name');
})();

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('btn-start').addEventListener('click', startGame);

document.getElementById('btn-send').addEventListener('click', () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  clearSuggestions();
  handlePlayerMessage(text);
});

document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('btn-send').click();
  }
});

document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

document.getElementById('farm-toggle').addEventListener('click', function() {
  const sections = document.querySelectorAll('.farm-side .panel-section:not(:first-child)');
  const expanded = sections[0]?.classList.contains('show-mobile');
  sections.forEach(s => s.classList.toggle('show-mobile', !expanded));
  this.textContent = expanded ? 'Show inventory & details \u25BE' : 'Hide details \u25B4';
});

document.querySelectorAll('#setup-screen input').forEach(input => {
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });
});
</script>
